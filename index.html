<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arkanoid</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }

    #stage {
      position: relative;
      width: 800px;
      height: 600px;
    }

    #game {
      display: block;
      background: #000;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      background: rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="800" height="600"></canvas>
    <div id="overlay"></div>
  </div>

  <script src="assets/spritesheet.js"></script>
  <script src="game.js"></script>
</body>
</html>
